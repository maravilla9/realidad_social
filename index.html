<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verdadero o Falso Social</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#f3f5f4;
    padding:20px;
    color:#1f2937;
}

.card{
    width:100%;
    max-width:820px;
    margin:auto;
    background:white;
    border-radius:28px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* LOGO */

.logo{
    width:70px;
    display:block;
    margin:auto;
    margin-bottom:12px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2.7rem;
    color:#15803d;
    margin-bottom:10px;
}

.header p{
    color:#6b7280;
    font-size:1rem;
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    background:#dcfce7;
    color:#166534;
    padding:12px 18px;
    border-radius:999px;
    font-weight:700;
    font-size:1rem;
}

.score{
    font-weight:700;
    color:#15803d;
    font-size:1.1rem;
}

/* PROGRESS */

.progress-container{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:28px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#16a34a,#22c55e);
    border-radius:999px;
    transition:0.4s ease;
}

/* QUESTION */

.question{
    background:#f8faf8;
    border:1px solid #d1fae5;
    border-radius:22px;
    padding:45px 30px;
    min-height:180px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    margin-bottom:24px;
}

.question h2{
    font-size:2rem;
    line-height:1.5;
}

/* BUTTONS */

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.btn{
    border:none;
    border-radius:18px;
    padding:18px;
    color:white;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.2s ease;
}

.btn:hover{
    transform:translateY(-2px);
}

.true{
    background:#16a34a;
}

.false{
    background:#dc2626;
}

/* FEEDBACK */

.feedback{
    margin-top:22px;
}

.feedback-box{
    border:1px solid #e5e7eb;
    border-radius:18px;
    padding:20px;
    background:#fafafa;
    text-align:left;
}

.feedback-title{
    font-weight:700;
    margin-bottom:10px;
    font-size:1rem;
}

.feedback-text{
    color:#4b5563;
    line-height:1.7;
}

.next-btn{
    margin-top:18px;
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

/* FINAL */

.final{
    display:none;
    margin-top:25px;
    text-align:center;
}

.final h2{
    color:#15803d;
    margin-bottom:10px;
}

.final p{
    color:#4b5563;
    margin-bottom:24px;
}

.final-actions{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
}

.share{
    background:#25D366;
}

.invite{
    background:#7c3aed;
}

.restart{
    background:#2563eb;
}

/* FOOTER */

.footer{
    margin-top:35px;
    padding-top:20px;
    border-top:1px solid #e5e7eb;
    text-align:center;
    color:#6b7280;
    font-size:0.95rem;
}

/* MOBILE */

@media(max-width:768px){

    .card{
        padding:20px;
    }

    .header h1{
        font-size:2rem;
    }

    .question{
        padding:30px 20px;
        min-height:140px;
    }

    .question h2{
        font-size:1.35rem;
    }

    .actions{
        grid-template-columns:1fr;
    }

    .final-actions{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="card">

    <img 
    src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png"
    class="logo"
    alt="UTEL">

    <div class="header">

        <h1>🎮 Verdadero o Falso Social</h1>

        <p>
            Analiza cada afirmación y demuestra cuánto sabes sobre realidad social.
        </p>

    </div>

    <div class="top">

        <div class="badge" id="contador">
            Pregunta 1 de 5
        </div>

        <div class="score">
            ⭐ Score: <span id="score">0</span>
        </div>

    </div>

    <!-- PROGRESS BAR -->

    <div class="progress-container">

        <div class="progress-bar" id="progressBar"></div>

    </div>

    <!-- QUESTION -->

    <div class="question" id="questionBox">

        <h2 id="pregunta"></h2>

    </div>

    <!-- BUTTONS -->

    <div class="actions" id="botones">

        <button class="btn true" onclick="responder(true)">
            ✅ Verdadero
        </button>

        <button class="btn false" onclick="responder(false)">
            ❌ Falso
        </button>

    </div>

    <!-- FEEDBACK -->

    <div class="feedback" id="resultado"></div>

    <!-- FINAL -->

    <div class="final" id="final">

        <h2>🎉 Juego terminado</h2>

        <p id="mensajeFinal"></p>

        <div class="final-actions">

            <button class="btn share"
            onclick="compartirWhatsApp()">
                📲 Compartir
            </button>

            <button class="btn invite"
            onclick="invitarAmigo()">
                🚀 Invitar
            </button>

            <button class="btn restart"
            onclick="location.reload()">
                🔄 Reiniciar
            </button>

        </div>

    </div>

    <div class="footer">
        Semana 3 | Docente UTEL | Dr. Armando Maravilla
    </div>

</div>

<script>

const preguntas = [

{
texto:"La sociología estudia los fenómenos sociales.",
respuesta:true,
explicacion:"La sociología analiza los fenómenos sociales y el comportamiento humano."
},

{
texto:"El análisis cronológico estudia relaciones entre amigos.",
respuesta:false,
explicacion:"El análisis cronológico estudia hechos y cambios a través del tiempo."
},

{
texto:"El análisis sociométrico estudia relaciones dentro de un grupo.",
respuesta:true,
explicacion:"Este método analiza relaciones, interacción y liderazgo social."
},

{
texto:"El análisis de ruptura estudia cambios históricos importantes.",
respuesta:true,
explicacion:"Analiza transformaciones profundas que cambian la sociedad."
},

{
texto:"Las redes sociales no influyen en la opinión pública.",
respuesta:false,
explicacion:"Las redes sociales sí pueden influir en la opinión pública."
}

];

let actual = 0;
let puntos = 0;

/* LOAD QUESTION */

function cargarPregunta(){

    document.getElementById("pregunta").innerHTML =
    preguntas[actual].texto;

    document.getElementById("contador").innerHTML =
    "Pregunta " + (actual + 1) + " de " + preguntas.length;

    document.getElementById("resultado").innerHTML = "";

    actualizarBarra();

}

/* PROGRESS BAR */

function actualizarBarra(){

    let progreso =
    (actual / preguntas.length) * 100;

    document.getElementById("progressBar").style.width =
    progreso + "%";

}

/* ANSWER */

function responder(opcion){

    const correcta = preguntas[actual].respuesta;

    if(opcion === correcta){
        puntos++;
    }

    document.getElementById("score").innerHTML =
    puntos;

    let estado =
    opcion === correcta
    ? "✅ Correcto"
    : "❌ Incorrecto";

    document.getElementById("resultado").innerHTML = `

        <div class="feedback-box">

            <div class="feedback-title">
                ${estado}
            </div>

            <div class="feedback-text">
                ${preguntas[actual].explicacion}
            </div>

            <button class="next-btn"
            onclick="continuar()">
                Continuar →
            </button>

        </div>

    `;

    document.querySelector(".true").disabled = true;
    document.querySelector(".false").disabled = true;

}

/* CONTINUE */

function continuar(){

    actual++;

    document.querySelector(".true").disabled = false;
    document.querySelector(".false").disabled = false;

    if(actual < preguntas.length){

        cargarPregunta();

    }else{

        finalizarJuego();

    }

}

/* FINAL */

function finalizarJuego(){

    document.getElementById("progressBar").style.width =
    "100%";

    document.getElementById("questionBox").style.display =
    "none";

    document.getElementById("botones").style.display =
    "none";

    document.getElementById("resultado").style.display =
    "none";

    document.getElementById("contador").innerHTML =
    "Finalizado";

    let mensaje = "";

    if(puntos == 5){

        mensaje =
        "🏆 Excelente trabajo. Score perfecto: " +
        puntos + "/5";

    }else if(puntos >=3){

        mensaje =
        "👏 Buen resultado. Score obtenido: " +
        puntos + "/5";

    }else{

        mensaje =
        "💡 Puedes volver a intentarlo. Score: " +
        puntos + "/5";

    }

    document.getElementById("mensajeFinal").innerHTML =
    mensaje;

    document.getElementById("final").style.display =
    "block";

}

/* SHARE */

function compartirWhatsApp(){

    const texto =
    "🎮 Obtuve un score de " +
    puntos +
    "/5 en Verdadero o Falso Social 📚";

    const url =
    "https://wa.me/?text=" +
    encodeURIComponent(texto);

    window.open(url,"_blank");

}

/* INVITE */

function invitarAmigo(){

    const texto =
    "🚀 Te invito a jugar Verdadero o Falso Social 🎮";

    const url =
    "https://wa.me/?text=" +
    encodeURIComponent(texto);

    window.open(url,"_blank");

}

cargarPregunta();

</script>

</body>
</html>
