<script>

const preguntas = [

{
texto:"La sociología estudia los fenómenos sociales.",
respuesta:true,
explicacion:"✅ Correcto. La sociología estudia los fenómenos y comportamientos sociales."
},

{
texto:"El análisis cronológico estudia relaciones entre amigos.",
respuesta:false,
explicacion:"❌ Incorrecto. El análisis cronológico estudia hechos a través del tiempo."
},

{
texto:"El análisis sociométrico estudia relaciones dentro de un grupo.",
respuesta:true,
explicacion:"✅ Correcto. Este método analiza vínculos e interacciones sociales."
},

{
texto:"El análisis de ruptura estudia cambios históricos importantes.",
respuesta:true,
explicacion:"✅ Correcto. Analiza transformaciones profundas en la sociedad."
},

{
texto:"Las redes sociales no influyen en la opinión pública.",
respuesta:false,
explicacion:"❌ Incorrecto. Las redes sociales sí pueden influir en la opinión pública."
}

];

let actual = 0;
let puntos = 0;

function cargarPregunta(){

    document.getElementById("pregunta").innerHTML =
    preguntas[actual].texto;

    document.getElementById("contador").innerHTML =
    "Pregunta " + (actual + 1) + " de " + preguntas.length;

    document.getElementById("resultado").innerHTML = "";

}

function responder(opcion){

    let correcta = preguntas[actual].respuesta;

    let caja = document.getElementById("resultado");

    if(opcion === correcta){

        puntos++;

    }

    document.getElementById("score").innerHTML = puntos;

    caja.innerHTML = `

        <div style="
            background:#fff;
            border:3px solid #e5e7eb;
            border-radius:15px;
            padding:20px;
            margin-top:20px;
            font-size:20px;
            line-height:1.5;
        ">

            ${preguntas[actual].explicacion}

            <br><br>

            <button onclick="continuar()"
            style="
                background:#2563eb;
                color:white;
                border:none;
                padding:12px 25px;
                border-radius:10px;
                font-size:18px;
                cursor:pointer;
            ">
                ➡️ Continuar
            </button>

        </div>

    `;

    document.querySelector(".verdadero").disabled = true;
    document.querySelector(".falso").disabled = true;

}

function continuar(){

    actual++;

    document.querySelector(".verdadero").disabled = false;
    document.querySelector(".falso").disabled = false;

    if(actual < preguntas.length){

        cargarPregunta();

    }else{

        finalizarJuego();

    }

}

function finalizarJuego(){

    document.getElementById("pregunta").style.display = "none";

    document.querySelector(".botones").style.display = "none";

    document.getElementById("contador").innerHTML =
    "Finalizado";

    let mensaje = "";

    if(puntos == 5){

        mensaje =
        "🏆 ¡Excelente! Obtuviste " + puntos + "/5";

    }else if(puntos >=3){

        mensaje =
        "👏 ¡Muy bien! Tu score fue " + puntos + "/5";

    }else{

        mensaje =
        "💡 Puedes volver a intentarlo. Score: " + puntos + "/5";

    }

    document.getElementById("final").style.display =
    "block";

    document.getElementById("mensajeFinal").innerHTML =
    mensaje;

}

function compartirWhatsApp(){

    let texto =
    "🎮 Obtuve un score de " + puntos +
    "/5 en Verdadero o Falso Social 📚";

    let url =
    "https://wa.me/?text=" +
    encodeURIComponent(texto);

    window.open(url,"_blank");

}

function invitarAmigo(){

    let texto =
    "🚀 Te invito a jugar Verdadero o Falso Social 🎮";

    let url =
    "https://wa.me/?text=" +
    encodeURIComponent(texto);

    window.open(url,"_blank");

}

cargarPregunta();

</script>
