<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verdadero o Falso Social</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#f3f4f6,#e8f5e9);
    padding:20px;
    text-align:center;
}

.contenedor{
    background:white;
    max-width:850px;
    margin:auto;
    border-radius:25px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h1{
    color:#198754;
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitulo{
    color:#666;
    margin-bottom:25px;
    font-size:1rem;
}

#contador{
    display:inline-block;
    background:#d1fae5;
    color:#065f46;
    padding:10px 20px;
    border-radius:50px;
    font-weight:bold;
    margin-bottom:25px;
}

.score-box{
    margin-top:15px;
    margin-bottom:20px;
    font-size:1.1rem;
    color:#198754;
    font-weight:bold;
}

#pregunta{
    background:#f8fff9;
    border:2px solid #c7f0d8;
    border-radius:20px;
    padding:35px;
    font-size:1.8rem;
    margin-bottom:25px;
    min-height:140px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.botones{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:15px;
    padding:18px;
    width:280px;
    font-size:1.2rem;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.verdadero{
    background:#16a34a;
}

.falso{
    background:#dc2626;
}

#resultado{
    margin-top:25px;
    font-size:1.5rem;
    font-weight:bold;
    min-height:40px;
}

.final{
    margin-top:30px;
    display:none;
}

.final h2{
    color:#198754;
    margin-bottom:15px;
    font-size:2rem;
}

.final p{
    font-size:1.2rem;
    margin-bottom:20px;
}

.compartir{
    background:#25D366;
}

.reiniciar{
    background:#2563eb;
}

.invitar{
    background:#7c3aed;
}

footer{
    margin-top:40px;
    background:#ecfdf5;
    padding:18px;
    border-radius:15px;
    color:#444;
    font-size:1rem;
}

/* RESPONSIVE */

@media(max-width:768px){

    h1{
        font-size:2rem;
    }

    #pregunta{
        font-size:1.4rem;
        padding:25px;
    }

    button{
        width:100%;
        font-size:1rem;
    }

}

</style>
</head>
<body>

<div class="contenedor">

    <img 
    src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png"
    class="logo"
    alt="UTEL">

    <h1>🎮 Verdadero o Falso Social</h1>

    <div class="subtitulo">
        Analiza cada afirmación y demuestra cuánto sabes sobre realidad social.
    </div>

    <div id="contador">
        Pregunta 1 de 5
    </div>

    <div class="score-box">
        ⭐ Score: <span id="score">0</span>
    </div>

    <div id="pregunta"></div>

    <div class="botones">

        <button class="verdadero" onclick="responder(true)">
            ✅ Verdadero
        </button>

        <button class="falso" onclick="responder(false)">
            ❌ Falso
        </button>

    </div>

    <div id="resultado"></div>

    <!-- FINAL -->

    <div class="final" id="final">

        <h2>🎉 Juego terminado</h2>

        <p id="mensajeFinal"></p>

        <div class="botones">

            <button class="compartir" onclick="compartirWhatsApp()">
                📲 Compartir en WhatsApp
            </button>

            <button class="invitar" onclick="invitarAmigo()">
                🚀 Invitar a un amigo
            </button>

            <button class="reiniciar" onclick="location.reload()">
                🔄 Jugar otra vez
            </button>

        </div>

    </div>

    <footer>
        Semana 3 | Docente UTEL | Dr. Armando Maravilla
    </footer>

</div>

<script>

const preguntas = [

{
texto:"La sociología estudia los fenómenos sociales.",
respuesta:true
},

{
texto:"El análisis cronológico estudia relaciones entre amigos.",
respuesta:false
},

{
texto:"El análisis sociométrico estudia relaciones dentro de un grupo.",
respuesta:true
},

{
texto:"El análisis de ruptura estudia cambios históricos importantes.",
respuesta:true
},

{
texto:"Las redes sociales no influyen en la opinión pública.",
respuesta:false
}

];

let actual = 0;
let puntos = 0;

function cargarPregunta(){

    document.getElementById("pregunta").innerHTML =
    preguntas[actual].texto;

    document.getElementById("contador").innerHTML =
    "Pregunta " + (actual + 1) + " de " + preguntas.length;

}

function responder(opcion){

    if(opcion === preguntas[actual].respuesta){

        puntos++;

        document.getElementById("resultado").innerHTML =
        "✅ ¡Correcto!";

    }else{

        document.getElementById("resultado").innerHTML =
        "❌ Incorrecto";

    }

    document.getElementById("score").innerHTML = puntos;

    actual++;

    if(actual < preguntas.length){

        setTimeout(()=>{

            document.getElementById("resultado").innerHTML = "";

            cargarPregunta();

        },1000);

    }else{

        setTimeout(finalizarJuego,1000);

    }

}

function finalizarJuego(){

    document.getElementById("pregunta").style.display = "none";
    document.querySelector(".botones").style.display = "none";
    document.getElementById("contador").innerHTML = "Finalizado";

    let mensaje = "";

    if(puntos == 5){

        mensaje = "🏆 ¡Excelente! Obtuviste " + puntos + "/5";

    }else if(puntos >=3){

        mensaje = "👏 ¡Muy bien! Tu score fue " + puntos + "/5";

    }else{

        mensaje = "💡 Puedes volver a intentarlo. Score: " + puntos + "/5";

    }

    document.getElementById("mensajeFinal").innerHTML = mensaje;

    document.getElementById("final").style.display = "block";

}

function compartirWhatsApp(){

    let texto =
    "🎮 Obtuve un score de " + puntos +
    "/5 en el juego Verdadero o Falso Social 📚 ¿Puedes superarme?";

    let url =
    "https://wa.me/?text=" + encodeURIComponent(texto);

    window.open(url,"_blank");

}

function invitarAmigo(){

    let texto =
    "🚀 Te invito a jugar Verdadero o Falso Social 🎮";

    let url =
    "https://wa.me/?text=" + encodeURIComponent(texto);

    window.open(url,"_blank");

}

cargarPregunta();

</script>

</body>
</html>
