<script>
const preguntas = [
    {
        texto: "La sociología estudia los fenómenos sociales.",
        respuesta: true,
        explicacion: "La sociología sí estudia los fenómenos sociales y el comportamiento humano."
    },
    {
        texto: "El análisis cronológico estudia relaciones entre amigos.",
        respuesta: false,
        explicacion: "El análisis cronológico estudia hechos a través del tiempo."
    },
    {
        texto: "El análisis sociométrico estudia relaciones dentro de un grupo.",
        respuesta: true,
        explicacion: "Este método analiza relaciones e interacciones sociales."
    },
    {
        texto: "El análisis de ruptura estudia cambios históricos importantes.",
        respuesta: true,
        explicacion: "Analiza cambios profundos que transforman la sociedad."
    },
    {
        texto: "Las redes sociales no influyen en la opinión pública.",
        respuesta: false,
        explicacion: "Las redes sociales sí pueden influir en la opinión pública."
    }
];

let actual = 0;
let puntos = 0;

const btnVerdadero = document.querySelector(".verdadero");
const btnFalso = document.querySelector(".falso");
const divPregunta = document.getElementById("pregunta");
const divContador = document.getElementById("contador");
const divScore = document.getElementById("score");
const divResultado = document.getElementById("resultado");
const divBotones = document.getElementById("botones");
const divFinal = document.getElementById("final");

function cargarPregunta() {
    divPregunta.innerHTML = preguntas[actual].texto;
    divContador.innerHTML = `Pregunta ${actual + 1} de ${preguntas.length}`;
    divResultado.innerHTML = "";
}

function responder(opcion) {
    const correcta = preguntas[actual].respuesta;
    
    if (opcion === correcta) {
        puntos++;
        divScore.innerHTML = puntos;
    }

    divResultado.innerHTML = `
        <div class="caja-explicacion">
            ${preguntas[actual].explicacion}
            <br><br>
            <button class="btn-continuar" onclick="continuar()">
                ➡️ Continuar
            </button>
        </div>
    `;

    btnVerdadero.disabled = true;
    btnFalso.disabled = true;
}

function continuar() {
    actual++;
    
    btnVerdadero.disabled = false;
    btnFalso.disabled = false;

    if (actual < preguntas.length) {
        cargarPregunta();
    } else {
        finalizarJuego();
    }
}

function finalizarJuego() {
    divPregunta.style.display = "none";
    divBotones.style.display = "none";
    divResultado.innerHTML = "";
    divContador.innerHTML = "Finalizado";

    let mensaje = "";
    if (puntos === 5) {
        mensaje = `🏆 ¡Excelente! Obtuviste un score perfecto de ${puntos}/5`;
    } else if (puntos >= 3) {
        mensaje = `👏 ¡Muy bien! Tu score fue de ${puntos}/5`;
    } else {
        mensaje = `💡 Puedes volver a intentarlo. Score: ${puntos}/5`;
    }

    document.getElementById("mensajeFinal").innerHTML = mensaje;
    divFinal.style.display = "block";
}

function compartirWhatsApp() {
    const texto = `🎮 Obtuve un score de ${puntos}/5 en Verdadero o Falso Social 📚 ¿Puedes superarme?`;
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, "_blank");
}

function invitarAmigo() {
    const texto = "🚀 Te invito a jugar Verdadero o Falso Social 🎮";
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, "_blank");
}

// Iniciar
cargarPregunta();
</script>
